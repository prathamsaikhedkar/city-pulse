services:
  - type: web
    name: citypulse-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WEB_POSTGRES_LINK
        sync: false          # set this in the Render dashboard
      - key: AQI_API_KEY_1
        sync: false
      - key: AQI_API_KEY_2
        sync: false
      - key: AQI_API_KEY_3
        sync: false
      - key: AQI_API_KEY_4
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # set to your Vercel frontend URL, e.g. https://citypulse.vercel.app
    healthCheckPath: /health
